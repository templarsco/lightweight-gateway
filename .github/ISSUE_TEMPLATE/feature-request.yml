name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use Case
      description: How would this help your workflow?
  - type: dropdown
    attributes:
      label: Category
      options:
        - New Model Support
        - New Integration
        - API Feature
        - Documentation
        - Performance
        - Other
